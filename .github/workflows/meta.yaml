on:
  pull_request:
    branches: [main]
    paths:
      - 'demos/**'

defaults:
  run:
    working-directory: demos/AvioNix-demo

jobs:
  check-licenses:
    name: Check licenses using reuse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # checkout full tree
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: Checking each commit to be merged for proper declaration of licenses
        run: >
          nix shell .#check-commits nixpkgs#reuse --command
          reuse lint
